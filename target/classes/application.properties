# ================================================================
# Dề Dê Ticket Booking System - Application Configuration
# ================================================================

spring.application.name=ticket-booking-system

# ---- H2 Database (Oracle compatibility mode) ----
spring.datasource.url=jdbc:h2:mem:dede_tickets;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- Server ----
server.port=8080
server.servlet.context-path=/api

# ---- JWT Configuration ----
app.jwt.secret=DeDeTicketBookingSystemSecretKey2026VeryLongSecretForHMACSHA256Algorithm
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ---- QR Code HMAC Secret ----
app.qrcode.secret=DeDeQRCodeHMACSHA256SecretKey2026ForAntiCounterfeitTickets

# ---- Booking Configuration ----
app.booking.lock-timeout-minutes=10
app.booking.max-tickets-per-order=10
app.booking.cleanup-interval-ms=60000

# ---- Payment Retry Configuration ----
app.payment.max-retry-count=3
app.payment.retry-base-delay-ms=2000
app.payment.success-rate=0.98
app.payment.simulated-delay-ms=500

# ---- Rate Limiting ----
app.rate-limit.requests-per-second=10
app.rate-limit.booking-requests-per-minute=20

# ---- Swagger / OpenAPI ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# ---- Logging ----
logging.level.com.dede=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
